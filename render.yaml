services:
  - type: web
    name: deaf-ai-healthcare
    runtime: docker
    repo: https://github.com/profcoderbae/deaf-ai-healthcare-assistant.git
    branch: master
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: groq
      - key: SECRET_KEY
        generateValue: true
      - key: HOSPITAL_NAME
        value: Tygerberg Hospital
      - key: RENDER
        value: "true"
